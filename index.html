<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - Organizador</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>⚡ TaskFlow</h1>
<p>Organiza tu día con estilo</p>
</header>

<div class="app">

<aside>

<h2>Categorías</h2>

<ul>
<li class="active">📋 Todas</li>
<li>💼 Trabajo</li>
<li>📚 Estudio</li>
<li>🏠 Personal</li>
</ul>

</aside>

<main>

<section class="tasks">

<h2>Mis Tareas</h2>

<!-- FORMULARIO PARA CREAR TAREAS -->

<div class="task-form">

<input type="text" id="taskInput" placeholder="Escribe una tarea...">

<select id="category">
<option>Trabajo</option>
<option>Estudio</option>
<option>Personal</option>
</select>

<select id="priority">
<option value="high">Alta</option>
<option value="medium">Media</option>
<option value="low">Baja</option>
</select>

<button onclick="addTask()">Añadir</button>

</div>

<!-- LISTA DE TAREAS -->

<div id="taskList">

</div>

</section>

</main>

</div>

<script src="app.js"></script>

</body>
</html>

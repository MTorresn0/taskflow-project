<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Task Organizer</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>Task Organizer</h1>
</header>

<div class="app">

  <aside class="sidebar">
    <h2>Categorías</h2>
    <ul>
      <li>Trabajo</li>
      <li>Personal</li>
      <li>Estudio</li>
    </ul>
  </aside>

  <main>

    <section class="tasks">

      <div class="task-card high">
        <span class="task-title">Terminar proyecto</span>
        <span class="category">Trabajo</span>
        <span class="priority">Alta</span>
      </div>

      <div class="task-card medium">
        <span class="task-title">Ir al gimnasio</span>
        <span class="category">Personal</span>
        <span class="priority">Media</span>
      </div>

      <div class="task-card low">
        <span class="task-title">Estudiar CSS</span>
        <span class="category">Estudio</span>
        <span class="priority">Baja</span>
      </div>

    </section>

  </main>

</div>

</body>
</html>

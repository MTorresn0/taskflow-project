<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Tareas</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    width:350px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

input, select, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#3498db;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

ul{
    list-style:none;
    padding:0;
    margin-top:20px;
}

li{
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    color:white;
}

.baja{
    background:#2ecc71;
}

.media{
    background:#f39c12;
}

.alta{
    background:#e74c3c;
}
</style>
</head>

<body>

<div class="container">
<h1>Mis Tareas</h1>

<input type="text" id="tarea" placeholder="Escribe una tarea">

<select id="prioridad">
<option value="baja">Prioridad Baja</option>
<option value="media">Prioridad Media</option>
<option value="alta">Prioridad Alta</option>
</select>

<button onclick="agregarTarea()">Añadir tarea</button>

<ul id="lista"></ul>
</div>

<script>
function agregarTarea(){

    let texto = document.getElementById("tarea").value;
    let prioridad = document.getElementById("prioridad").value;

    if(texto === "") return;

    let li = document.createElement("li");
    li.textContent = texto + " (" + prioridad + ")";
    li.classList.add(prioridad);

    document.getElementById("lista").appendChild(li);

    document.getElementById("tarea").value="";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task App</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>Gestor de Tareas</h1>
</header>

<main>

<aside class="sidebar">
<h2>Categorías</h2>
<ul>
<li>Trabajo</li>
<li>Estudio</li>
<li>Personal</li>
</ul>
</aside>

<section class="task-container">

<h2>Lista de tareas</h2>

<div class="task-card alta">
<span class="task-title">Terminar proyecto</span>
<span class="task-category">Trabajo</span>
<span class="badge">Alta</span>
</div>

<div class="task-card media">
<span class="task-title">Estudiar HTML</span>
<span class="task-category">Estudio</span>
<span class="badge">Media</span>
</div>

<div class="task-card baja">
<span class="task-title">Ir al gimnasio</span>
<span class="task-category">Personal</span>
<span class="badge">Baja</span>
</div>

</section>

</main>

</body>
</html>
